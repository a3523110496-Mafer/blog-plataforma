name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependencias backend
        run: |
          cd backend
          npm install

      - name: Ejecutar tests backend
        run: |
          cd backend
          npm test || echo "No hay tests aún"

      - name: Verificar frontend
        run: |
          cd frontend
          echo "Frontend listo"