<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
font-family: Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f4f4;
}

.login-container{
background:white;
padding:30px;
border-radius:8px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:10px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
}

button{
margin-top:15px;
width:100%;
padding:10px;
background:#0077ff;
color:white;
border:none;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}
</style>
</head>

<body>

<div class="login-container">

<h2>Iniciar sesión</h2>

<form id="loginForm">

<label for="email">Correo electrónico</label>
<input 
id="email"
type="text"
required
aria-describedby="emailError"
/>

<label for="password">Contraseña</label>
<input 
id="password"
type="password"
required
aria-describedby="passwordError"
/>

<button type="submit">Entrar</button>

<div 
id="errorMessage" 
class="error" 
role="alert"
aria-live="assertive">
</div>

</form>

</div>

<script src="../scripts/login.js"></script>

</body>
</html>
